<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Wallet discount card banner</title>
  <desc id="desc">Illustrated wallet card showing discount points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f06418"/>
      <stop offset=".55" stop-color="#bd4510"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <circle cx="940" cy="260" r="250" fill="#fff" opacity=".12"/>
  <g filter="url(#shadow)">
    <rect x="670" y="145" width="390" height="240" rx="28" fill="#101820"/>
    <rect x="700" y="182" width="92" height="58" rx="10" fill="#f6bd2f"/>
    <text x="704" y="304" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="#fff">VMC Discount Card</text>
    <text x="704" y="342" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#cfd8d3">Wallet points after purchase</text>
    <circle cx="985" cy="210" r="35" fill="#168451"/>
    <circle cx="945" cy="210" r="35" fill="#f06418" opacity=".9"/>
  </g>
  <g fill="#fff">
    <text x="72" y="138" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" opacity=".82">Wallet Rewards</text>
    <text x="72" y="224" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900">Buy Points</text>
    <text x="72" y="300" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900">Like Products</text>
    <text x="76" y="358" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" opacity=".86">Discount cards credit wallet points at checkout.</text>
  </g>
</svg>
