<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Grocery shelves banner</title>
  <desc id="desc">Illustrated modern grocery shelves with packets and bottles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#101820"/>
      <stop offset=".6" stop-color="#173f32"/>
      <stop offset="1" stop-color="#0f8a8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <path d="M660 88h390v350H660z" fill="#fff" opacity=".14"/>
  <g filter="url(#shadow)">
    <rect x="655" y="110" width="420" height="305" rx="24" fill="#fff"/>
    <rect x="700" y="165" width="78" height="98" rx="10" fill="#f06418"/>
    <rect x="802" y="145" width="72" height="118" rx="10" fill="#168451"/>
    <rect x="900" y="180" width="92" height="83" rx="10" fill="#f6bd2f"/>
    <path d="M690 282h330M690 340h330" stroke="#d9e5df" stroke-width="12" stroke-linecap="round"/>
    <rect x="718" y="300" width="62" height="40" rx="8" fill="#0f8a8a"/>
    <rect x="806" y="296" width="84" height="44" rx="8" fill="#101820"/>
    <rect x="916" y="302" width="74" height="38" rx="8" fill="#168451"/>
  </g>
  <g fill="#fff">
    <text x="72" y="138" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" opacity=".82">Admin Managed</text>
    <text x="72" y="224" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900">MRP, Tax</text>
    <text x="72" y="300" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900">Stock &amp; Orders</text>
    <text x="76" y="358" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" opacity=".86">Run your ecommerce catalog from one dashboard.</text>
  </g>
