<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Fresh vegetables grocery banner</title>
  <desc id="desc">Illustrated grocery basket with vegetables and fresh produce.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#0b5332"/>
      <stop offset=".55" stop-color="#168451"/>
      <stop offset="1" stop-color="#f06418"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <circle cx="970" cy="110" r="190" fill="#ffffff" opacity=".12"/>
  <circle cx="1060" cy="430" r="230" fill="#ffffff" opacity=".10"/>
  <g filter="url(#shadow)">
    <rect x="650" y="150" width="360" height="240" rx="28" fill="#fff"/>
    <path d="M710 210h240l-32 130H742z" fill="#f7faf8" stroke="#d9e5df" stroke-width="8"/>
    <path d="M750 210c18-70 142-70 160 0" fill="none" stroke="#0b5332" stroke-width="18" stroke-linecap="round"/>
    <circle cx="760" cy="280" r="42" fill="#f06418"/>
    <circle cx="825" cy="270" r="46" fill="#168451"/>
    <circle cx="890" cy="292" r="40" fill="#f6bd2f"/>
    <path d="M715 328h230" stroke="#d9e5df" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g fill="#fff">
    <text x="72" y="138" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" opacity=".82">VMCmarts Fresh</text>
    <text x="72" y="224" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900">Farm Fresh</text>
    <text x="72" y="300" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="900">Daily Essentials</text>
    <text x="76" y="358" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" opacity=".86">Vegetables, fruits, grocery and kitchen products.</text>
  </g>
</svg>
